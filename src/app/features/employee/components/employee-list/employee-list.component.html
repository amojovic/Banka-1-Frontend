<div class="page-wrapper">
  <header class="top-header">
    <div class="header-text">
      <h1>Employees</h1>
      <p>Manage company employees</p>
    </div>
    <button class="btn-add">+ Add employee</button>
  </header>

  <div class="main-content">
    <div class="filter-bar">
      <div class="search-wrapper">
        <svg class="search-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"></circle>
          <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
        </svg>
        <input type="text" placeholder="Search employees..." class="search-input" (input)="onSearchInput($event)">
      </div>
      
      <div class="dropdown-wrapper">
        <span class="dropdown-label">Status</span>
        <select class="custom-select" (change)="onStatusChange($event)">
          <option value="All">All</option>
          <option value="Active">Active</option>
          <option value="Inactive">Inactive</option>
        </select>
      </div>

      <div class="dropdown-wrapper">
        <span class="dropdown-label">Permissions</span>
        <select class="custom-select" (change)="onPermissionChange($event)">
          <option value="All">All</option>
          <option value="Create">Create</option>
          <option value="Edit">Edit</option>
          <option value="View">View</option>
          <option value="Delete">Delete</option>
        </select>
      </div>
    </div>

    <div class="table-container">
      <table class="figma-table">
        <thead>
          <tr>
            <th>Name</th>
            <th>Email</th>
            <th>Role</th>
            <th>Status</th>
            <th>Permissions</th>
            <th></th> 
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let emp of filteredEmployees; trackBy: trackById">
            <td class="fw-bold">{{ emp.firstName }} {{ emp.lastName }}</td>
            <td class="email-text">{{ emp.email }}</td>
            <td>
              <div class="role-pill" [ngClass]="emp.role === 'Admin' ? 'admin' : 'regular'">
                {{ emp.role }}
                <svg width="10" height="6" viewBox="0 0 10 6" fill="none" xmlns="http://www.w3.org/2000/svg">
                  <path d="M1 1L5 5L9 1" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
              </div>
            </td>
            <td class="fw-bold">{{ emp.status ? 'Active' : 'Inactive' }}</td>
            <td>
              <div class="permissions-wrapper">
                <span class="perm-pill" *ngFor="let perm of emp.permissions | slice:0:3">{{ perm }}</span>
                <span class="perm-text" *ngIf="emp.permissions.length > 3">+{{ emp.permissions.length - 3 }}</span>
              </div>
            </td>
            <td class="action-cell">
              <button class="btn-delete" (click)="deleteEmployee(emp.id)">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
                  <path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/>
                </svg>
              </button>
            </td>
          </tr>
          
          <tr *ngIf="filteredEmployees.length < 2"><td></td><td></td><td></td><td></td><td></td><td></td></tr>
          <tr *ngIf="filteredEmployees.length < 1"><td></td><td></td><td></td><td></td><td></td><td></td></tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
